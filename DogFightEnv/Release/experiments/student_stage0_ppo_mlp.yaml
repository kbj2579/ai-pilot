# Phase 1 / Stage 0 (flight_survival) isolated single-stage run.
#
# Mirrors student/my_curriculum.py stage index 0 so this YAML can be used to
# iterate quickly (dry-run / smoke / short run) before wiring the full
# multi-stage pipeline via train_curriculum.py --stages-module student.my_curriculum.
#
# IMPORTANT: env_config.reward is intentionally OMITTED. If present, it would
# populate cfg["reward"] before env_creator's reward_module hook runs, and
# since that hook only does cfg.setdefault("reward", ...), it would silently
# shadow MY_REWARD_CONFIG entirely. Leave this block out for every YAML that
# uses env.reward_module: student.my_reward.

name: student_stage0_ppo_mlp
script: train_rllib

output:
  name: team01
  tag: stage0_v1

env:
  observation_mode: tactical16
  target_mode: fixed
  target_behavior_dll: AIP_BASE_target.dll
  reward_module: student.my_reward
  max_engage_time: 30.0
  episode_step_limit: 1500

env_config:
  step_ratio: 6

algo:
  name: ppo
  framework: torch
  lr: 3.0e-4
  gamma: 0.99
  train_batch_size: 2048
  minibatch_size: 256
  gae_lambda: 0.95
  clip_param: 0.2
  mlp:
    enabled: true
    fcnet_hiddens: [128, 128]
    fcnet_activation: relu
    head_fcnet_hiddens: []
    head_fcnet_activation: relu
    vf_share_layers: true

runtime:
  iterations: 200
  num_env_runners: 4
  num_envs_per_env_runner: 1
  rollout_fragment_length: auto
  batch_mode: truncate_episodes
  checkpoint_frequency: 20
  save_native_checkpoint: false

dashboard:
  enabled: true
  logdir: artifacts/dashboard

policy_probe:
  enabled: true
  interval: 10
  steps: 4
  print: true

engagement_log:
  enabled: true
  interval: 20
  steps: 300
  episodes: 1
  print: true

notes: "Phase 1 Stage 0 (flight_survival) isolated run: student.my_reward, fixed stationary target, no combat weights active."
